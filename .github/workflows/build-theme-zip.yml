name: Build theme ZIP

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.php'
      - '**.css'
      - '**.json'
      - 'templates/**'
      - 'parts/**'
      - 'patterns/**'
      - 'styles/**'
      - 'readme.txt'
      - 'screenshot.png'

permissions:
  contents: read

jobs:
  package:
    name: Package theme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create clean package directory
        run: |
          mkdir -p build/linea
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tools' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            ./ build/linea/

      - name: Create ZIP artifact
        run: |
          cd build
          zip -r linea.zip linea

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: linea-theme
          path: build/linea.zip
