name: Release theme ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Package and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create clean package directory
        run: |
          mkdir -p build/linea
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tools' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            ./ build/linea/

      - name: Create ZIP
        run: |
          cd build
          zip -r linea.zip linea

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" build/linea.zip --generate-notes
